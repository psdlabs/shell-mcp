name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Verify the mcp-lite entry point is loadable
      - name: Verify mcp-lite dist
        run: node -e "import('./packages/mcp-lite/dist/server.js').then(() => console.log('OK'))"
        shell: bash

      # Verify core exports
      - name: Verify core dist
        run: node -e "import('./packages/core/dist/index.js').then(m => { if(!m.SessionManager) throw 'missing'; console.log('OK') })"
        shell: bash
